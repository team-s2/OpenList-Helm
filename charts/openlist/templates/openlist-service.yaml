apiVersion: v1
kind: Service
metadata:
  name: {{ template "openlist.fullname" . }}
  namespace: {{ include "openlist.namespace" . }}
  labels:
    {{- include "openlist.labels" . | nindent 4 }}
    {{- with .Values.service.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
  {{- with .Values.service.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  type: {{ .Values.service.type | default "ClusterIP" }}
  {{- if and (eq .Values.service.type "LoadBalancer") (not (empty .Values.service.loadBalancerIP)) }}
  loadBalancerIP: {{ default "" .Values.service.loadBalancerIP | quote }}
  {{- end }}
  ports:
  - name: http
    protocol: TCP
    port: {{ .Values.service.http.port }}
    targetPort: {{ .Values.service.http.targetPort }}
    {{- if (and (eq .Values.service.type "NodePort") ( .Values.service.http.nodePort)) }}
    nodePort: {{ .Values.service.http.nodePort }}
    {{- end }}
  {{- if .Values.service.https.enabled }}
  - name: https
    protocol: TCP
    port: {{ .Values.service.https.port }}
    targetPort: {{ .Values.service.https.targetPort }}
    {{- if (and (eq .Values.service.type "NodePort") ( .Values.service.https.nodePort)) }}
    nodePort: {{ .Values.service.https.nodePort }}
    {{- end }}
  {{- end }}
  selector:
    {{- include "openlist.selectorLabels" . | nindent 4 }}
